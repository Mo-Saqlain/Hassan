<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hassan ERP — Redesign</title>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="app.css"/>
<script>
  // bootstrap theme before paint
  try {
    const t = localStorage.getItem("hassan-theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", t);
  } catch(e) {}
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="pages1.jsx"></script>
<script type="text/babel" src="pages2.jsx"></script>
<script type="text/babel" src="pages3.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const { Sidebar, Topbar } = window.AppShell;
const { Dashboard, POS } = window.Pages1;
const { MasterData, Transactions, Sales, Ledger } = window.Pages2;
const { CashBook, Stock, Financials } = window.Pages3;

const ROUTES = {
  dashboard:    { crumb:"Dashboard",          Comp: Dashboard },
  pos:          { crumb:"POS Terminal",       Comp: POS },
  master:       { crumb:"Catalogue",          Comp: MasterData },
  tx:           { crumb:"Transactions",       Comp: Transactions },
  cash:         { crumb:"Cash Book",          Comp: CashBook },
  stock:        { crumb:"Stock Summary",      Comp: Stock },
  "stock-ledger": { crumb:"Stock Ledger",     Comp: Stock },
  "cust-ledger":{ crumb:"Customer Ledger",    Comp: () => <Ledger title="Customer ledger" party="Asad Khan" positive="owes you"/> },
  "supp-ledger":{ crumb:"Supplier Ledger",    Comp: () => <Ledger title="Supplier ledger" party="Dawlance Distributors" positive="you owe"/> },
  financials:   { crumb:"Financial Statements", Comp: Financials },
  incentives:   { crumb:"Incentives",         Comp: Dashboard },
  backup:       { crumb:"Backups",            Comp: Dashboard },
};

function App() {
  const initialPage = (window.location.hash || "").replace(/^#/, "").split("&")[0] || "dashboard";
  const [page, setPage] = useState(ROUTES[initialPage] ? initialPage : "dashboard");
  const [theme, setTheme] = useState(document.documentElement.getAttribute("data-theme") || "dark");
  const [navOpen, setNavOpen] = useState(false);
  const tweakDefaults = /*EDITMODE-BEGIN*/{
    "accent": "violet-cyan",
    "radius": 16,
    "glass": 100,
    "aurora": 120
  }/*EDITMODE-END*/;

  // sync theme
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem("hassan-theme", theme); } catch(e) {}
  }, [theme]);

  const route = ROUTES[page] || ROUTES.dashboard;
  const Comp = route.Comp;

  return (
    <div className="app" data-nav={navOpen ? "open" : "closed"}>
      <div className="scrim" onClick={() => setNavOpen(false)}></div>
      <Sidebar active={page} onPick={(p) => { setPage(p); setNavOpen(false); }}/>
      <div className="main">
        <Topbar crumbs={route.crumb} theme={theme} setTheme={setTheme} onMenu={() => setNavOpen(true)}/>
        <div className="content">
          <Comp/>
        </div>
      </div>
      <TweakHost defaults={tweakDefaults}/>
    </div>
  );
}

function TweakHost({ defaults }) {
  const [t, setTweak] = window.useTweaks(defaults);

  useEffect(() => {
    const palettes = {
      "violet-cyan":  { p:"linear-gradient(135deg,#7c3aed 0%,#6366f1 45%,#06b6d4 100%)", a:"linear-gradient(135deg,#ec4899 0%,#8b5cf6 60%,#06b6d4 100%)" },
      "teal-cobalt":  { p:"linear-gradient(135deg,#0ea5e9 0%,#06b6d4 45%,#14b8a6 100%)", a:"linear-gradient(135deg,#22d3ee 0%,#3b82f6 60%,#a855f7 100%)" },
      "sunset":       { p:"linear-gradient(135deg,#f43f5e 0%,#f97316 45%,#fbbf24 100%)", a:"linear-gradient(135deg,#ec4899 0%,#f97316 60%,#fbbf24 100%)" },
      "emerald-gold": { p:"linear-gradient(135deg,#10b981 0%,#22d3ee 45%,#fbbf24 100%)", a:"linear-gradient(135deg,#34d399 0%,#fbbf24 100%)" },
    };
    const cur = palettes[t.accent] || palettes["violet-cyan"];
    document.documentElement.style.setProperty("--gradient-primary", cur.p);
    document.documentElement.style.setProperty("--gradient-accent",  cur.a);
    document.documentElement.style.setProperty("--radius-lg", t.radius + "px");
    document.documentElement.style.setProperty("--radius",    Math.max(8, t.radius - 4) + "px");
    document.documentElement.style.setProperty("--glass-strength", (t.glass / 100).toFixed(2));
    document.documentElement.style.setProperty("--aurora-strength", (t.aurora / 100).toFixed(2));
  }, [t]);

  return (
    <window.TweaksPanel title="Tweaks">
      <window.TweakSection label="Palette">
        <window.TweakRadio label="Accent" value={t.accent} onChange={(v)=>setTweak("accent",v)} options={[
          { value:"violet-cyan",  label:"Electric" },
          { value:"teal-cobalt",  label:"Cobalt" },
          { value:"sunset",       label:"Sunset" },
          { value:"emerald-gold", label:"Emerald" },
        ]}/>
      </window.TweakSection>
      <window.TweakSection label="Shape & glass">
        <window.TweakSlider label="Corner radius" value={t.radius} min={6} max={28} step={2} unit="px" onChange={(v)=>setTweak("radius",v)}/>
        <window.TweakSlider label="Glass strength" value={t.glass} min={0} max={100} step={5} unit="%" onChange={(v)=>setTweak("glass",v)}/>
        <window.TweakSlider label="Aurora strength" value={t.aurora} min={0} max={140} step={10} unit="%" onChange={(v)=>setTweak("aurora",v)}/>
      </window.TweakSection>
    </window.TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
