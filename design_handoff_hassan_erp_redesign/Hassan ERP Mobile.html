<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hassan ERP — Mobile Preview</title>
<style>
  :root {
    --bg: #07081a;
    --ink: #e7ecff;
    --muted: #8b93b8;
    --border: rgba(255,255,255,0.08);
    --surface: rgba(20,22,48,0.6);
    --font: 'Inter', -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font); min-height: 100vh; }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(40vmax 30vmax at 15% 12%, rgba(124,58,237,0.45), transparent 60%),
      radial-gradient(36vmax 28vmax at 88% 18%, rgba(6,182,212,0.32), transparent 60%),
      radial-gradient(28vmax 22vmax at 72% 50%, rgba(236,72,153,0.24), transparent 65%);
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 92%);
            mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 92%);
    filter: blur(50px) saturate(140%);
    opacity: 0.9;
  }
  header.page {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 40px 20px; gap: 24px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
    display: grid; place-items: center;
    box-shadow: 0 8px 24px rgba(124,58,237,0.45);
  }
  .brand-mark svg { width: 18px; height: 18px; color: white; }
  .brand-text { line-height: 1.15; }
  .brand-text strong { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .brand-text span { display: block; font-size: 11px; color: var(--muted); }
  h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  h1 small { display: block; color: var(--muted); font-size: 12px; font-weight: 400; margin-top: 2px; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .seg {
    display: flex; padding: 3px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); backdrop-filter: blur(10px);
  }
  .seg button {
    border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 12px;
    padding: 6px 12px; border-radius: 7px; cursor: pointer; transition: 160ms;
  }
  .seg button.on { background: rgba(255,255,255,0.08); color: var(--ink); }
  .open-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    color: white; font: 600 12px/1 var(--font); text-decoration: none;
    box-shadow: 0 8px 22px rgba(124,58,237,0.35);
  }

  .stage {
    display: flex; gap: 36px; padding: 12px 40px 60px;
    overflow-x: auto; scroll-snap-type: x mandatory;
    min-height: 880px;
  }
  .phone-wrap { scroll-snap-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; flex: 0 0 auto; }
  .phone-label { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }

  .phone {
    position: relative;
    width: 402px; height: 850px;
    border-radius: 56px;
    background: #0a0c1a;
    box-shadow:
      0 0 0 12px #15172a,
      0 0 0 13px rgba(255,255,255,0.06),
      0 60px 120px -20px rgba(0,0,0,0.6),
      0 30px 70px -10px rgba(124,58,237,0.25);
    overflow: hidden;
  }
  .phone .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 124px; height: 36px; border-radius: 24px; background: #000;
    z-index: 30;
  }
  .phone .home {
    position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
    width: 132px; height: 5px; border-radius: 10px;
    background: rgba(255,255,255,0.55);
    z-index: 30;
  }
  .phone iframe {
    position: absolute; inset: 0;
    width: 402px; height: 850px;
    border: 0;
    background: var(--bg);
  }

  /* Light mode flip */
  body.light { background: #f4f5fb; color: #14172b; }
  body.light .brand-text strong { color: #14172b; }
  body.light .seg { background: rgba(255,255,255,0.6); }
  body.light .seg button { color: #5b6280; }
  body.light .seg button.on { background: white; color: #14172b; }
  body.light .phone { background: #fff; box-shadow: 0 0 0 12px #d9dbe8, 0 0 0 13px rgba(0,0,0,0.05), 0 50px 110px -20px rgba(0,0,0,0.18); }
  body.light .phone .home { background: rgba(0,0,0,0.3); }

  @media (max-width: 720px) {
    header.page { padding: 18px 16px 12px; }
    .stage { padding: 12px 16px 40px; gap: 20px; }
    .phone { width: 320px; height: 676px; border-radius: 44px; box-shadow: 0 0 0 10px #15172a, 0 30px 70px -10px rgba(0,0,0,0.5); }
    .phone iframe { width: 320px; height: 676px; }
  }
</style>
</head>
<body>

<header class="page">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>
      </svg>
    </div>
    <div class="brand-text">
      <strong>Hassan Electronics</strong>
      <span>Mobile preview</span>
    </div>
  </div>
  <div style="flex:1"></div>
  <div class="controls">
    <div class="seg" role="tablist" id="themeSeg">
      <button data-theme="dark" class="on">Dark</button>
      <button data-theme="light">Light</button>
    </div>
    <a class="open-btn" href="Hassan ERP Redesign.html" target="_blank" rel="noopener">
      Open full app →
    </a>
  </div>
</header>

<section class="stage">
  <div class="phone-wrap">
    <div class="phone-label">Dashboard</div>
    <div class="phone">
      <div class="island"></div>
      <iframe data-page="dashboard" title="Dashboard" loading="lazy"></iframe>
      <div class="home"></div>
    </div>
  </div>
  <div class="phone-wrap">
    <div class="phone-label">POS terminal</div>
    <div class="phone">
      <div class="island"></div>
      <iframe data-page="pos" title="POS" loading="lazy"></iframe>
      <div class="home"></div>
    </div>
  </div>
  <div class="phone-wrap">
    <div class="phone-label">Catalogue</div>
    <div class="phone">
      <div class="island"></div>
      <iframe data-page="master" title="Catalogue" loading="lazy"></iframe>
      <div class="home"></div>
    </div>
  </div>
  <div class="phone-wrap">
    <div class="phone-label">Customer ledger</div>
    <div class="phone">
      <div class="island"></div>
      <iframe data-page="custLedger" title="Customer ledger" loading="lazy"></iframe>
      <div class="home"></div>
    </div>
  </div>
  <div class="phone-wrap">
    <div class="phone-label">Cash book</div>
    <div class="phone">
      <div class="island"></div>
      <iframe data-page="cash" title="Cash book" loading="lazy"></iframe>
      <div class="home"></div>
    </div>
  </div>
</section>

<script>
  // Each iframe loads the main app and tells it which page to show.
  // We do it via URL hash; the main HTML reads location.hash on init.
  const iframes = document.querySelectorAll('iframe[data-page]');
  iframes.forEach(f => {
    f.src = 'Hassan ERP Redesign.html#' + f.dataset.page;
  });

  // Theme toggle — proxy to each iframe by hash too
  const seg = document.getElementById('themeSeg');
  seg.addEventListener('click', e => {
    const b = e.target.closest('button[data-theme]');
    if (!b) return;
    seg.querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
    const theme = b.dataset.theme;
    document.body.classList.toggle('light', theme === 'light');
    iframes.forEach(f => {
      try {
        f.contentDocument.documentElement.setAttribute('data-theme', theme);
      } catch (err) { /* cross-origin fallback */
        f.src = f.src.split('#')[0] + '#' + f.dataset.page + '&theme=' + theme + '&_=' + Date.now();
      }
    });
  });
</script>

</body>
</html>
