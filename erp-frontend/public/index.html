<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0078d4" />
    <meta
      name="description"
      content="Hassan Electronics — Home Appliances ERP & Point of Sale"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts: Plus Jakarta Sans (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Hassan Electronics — Home Appliances</title>

    <!--
      Content-Security-Policy. `script-src 'self'` prevents an XSS-injected
      inline <script> from running — the only legitimate inline script
      previously here (the theme bootstrap) was extracted to theme-bootstrap.js
      so this stays strict. `'unsafe-inline'` survives only on style-src
      because React + CRA inject inline style="" attributes; removing it
      would need every component refactored. connect-src is wide (http: https:)
      to keep LAN-from-phone access working when CLOUD_SYNC_URL points at any
      cloud receiver; script execution is the high-leverage protection, not
      where data goes.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'"
    />

    <!-- Theme bootstrap: apply saved/system theme before render to avoid flash -->
    <script src="%PUBLIC_URL%/theme-bootstrap.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
